steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    secretEnv:
      - NEXT_PUBLIC_SUPABASE_URL
      - NEXT_PUBLIC_SUPABASE_ANON_KEY
      - NEXT_PUBLIC_API_URL
    args:
      - -c
      - |
        docker build --no-cache \
          -t southamerica-east1-docker.pkg.dev/glass-sylph-491920-a4/m7-cms/m7-cms-web:$COMMIT_SHA \
          -t southamerica-east1-docker.pkg.dev/glass-sylph-491920-a4/m7-cms/m7-cms-web:latest \
          --build-arg NEXT_PUBLIC_API_URL="$$NEXT_PUBLIC_API_URL" \
          --build-arg NEXT_PUBLIC_SUPABASE_URL="$$NEXT_PUBLIC_SUPABASE_URL" \
          --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
          -f apps/m7-cms-web/Dockerfile \
          .

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - southamerica-east1-docker.pkg.dev/glass-sylph-491920-a4/m7-cms/m7-cms-web

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - m7-cms-web
      - --image=southamerica-east1-docker.pkg.dev/glass-sylph-491920-a4/m7-cms/m7-cms-web:$COMMIT_SHA
      - --region=southamerica-east1
      - --platform=managed
      - --allow-unauthenticated
      - --ingress=all
      - --port=3000
      - --min-instances=1
      - --max-instances=2
      - --memory=512Mi
      - --cpu=1
      - --quiet

availableSecrets:
  secretManager:
    - versionName: projects/glass-sylph-491920-a4/secrets/m7-cms-web-NEXT_PUBLIC_SUPABASE_URL/versions/latest
      env: NEXT_PUBLIC_SUPABASE_URL
    - versionName: projects/glass-sylph-491920-a4/secrets/m7-cms-web-NEXT_PUBLIC_SUPABASE_ANON_KEY/versions/latest
      env: NEXT_PUBLIC_SUPABASE_ANON_KEY
    - versionName: projects/glass-sylph-491920-a4/secrets/m7-cms-web-NEXT_PUBLIC_API_URL/versions/latest
      env: NEXT_PUBLIC_API_URL

images:
  - southamerica-east1-docker.pkg.dev/glass-sylph-491920-a4/m7-cms/m7-cms-web:$COMMIT_SHA
  - southamerica-east1-docker.pkg.dev/glass-sylph-491920-a4/m7-cms/m7-cms-web:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

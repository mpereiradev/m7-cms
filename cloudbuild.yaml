substitutions:
  _REGION: us-central1
  _REPO: m7-cms

steps:
  # ── Build API image ──────────────────────────────────────────────
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/m7-cms-api/Dockerfile
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-api:$SHORT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-api:latest'
      - .

  # ── Build Web image ─────────────────────────────────────────────
  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/m7-cms-web/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-web:$SHORT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-web:latest'
      - .

  # ── Push API image ──────────────────────────────────────────────
  - id: push-api
    name: gcr.io/cloud-builders/docker
    waitFor: ['build-api']
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-api'

  # ── Push Web image ─────────────────────────────────────────────
  - id: push-web
    name: gcr.io/cloud-builders/docker
    waitFor: ['build-web']
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-web'

  # ── Deploy API to Cloud Run ─────────────────────────────────────
  - id: deploy-api
    name: gcr.io/cloud-builders/gcloud
    waitFor: ['push-api']
    args:
      - run
      - deploy
      - m7-cms-api
      - --image
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-api:$SHORT_SHA'
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --port
      - '3001'
      - --allow-unauthenticated

  # ── Deploy Web to Cloud Run ────────────────────────────────────
  - id: deploy-web
    name: gcr.io/cloud-builders/gcloud
    waitFor: ['push-web']
    args:
      - run
      - deploy
      - m7-cms-web
      - --image
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-web:$SHORT_SHA'
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --port
      - '3000'
      - --allow-unauthenticated

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-api:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-api:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-web:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/m7-cms-web:latest'

options:
  logging: CLOUD_LOGGING_ONLY
